<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Veterinario Bianchi - Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes bounce {
            0%, 20%, 53%, 80%, 100% { transform: translateY(0px); }
            40%, 43% { transform: translateY(-10px); }
            70% { transform: translateY(-5px); }
            90% { transform: translateY(-2px); }
        }
        .animate-bounce { animation: bounce 1s infinite; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-md mx-auto bg-white shadow-2xl rounded-lg overflow-hidden">
        <!-- Header -->
        <div class="bg-gradient-to-r from-green-600 to-green-700 text-white p-4">
            <div class="flex items-center space-x-3">
                <div class="bg-white rounded-full p-2">
                    <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.222 19.778a4.5 4.5 0 001.423-2.765L5 15.5c0-1.036.84-1.875 1.875-1.875S8.75 14.464 8.75 15.5s-.84 1.875-1.875 1.875c-1.035 0-1.875.84-1.875 1.875zM15 11.25c0-2.485 2.015-4.5 4.5-4.5s4.5 2.015 4.5 4.5-2.015 4.5-4.5 4.5-4.5-2.015-4.5-4.5z"></path>
                    </svg>
                </div>
                <div>
                    <h3 class="font-bold text-lg">Studio Veterinario Bianchi</h3>
                    <p class="text-green-100 text-sm flex items-center">
                        <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span>
                        Online • La salute del tuo amico!
                    </p>
                </div>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatMessages" class="h-96 overflow-y-auto p-4 space-y-4 bg-green-50">
            <div class="flex justify-start">
                <div class="max-w-xs lg:max-w-md px-4 py-3 rounded-2xl bg-white text-black shadow-md border border-green-200 rounded-bl-md">
                    <div class="whitespace-pre-line text-sm leading-relaxed font-semibold">🩺 Ciao! Sono l'assistente dello Studio Veterinario Bianchi. Benvenuto! Clicca su uno dei pulsanti qui sotto per le informazioni che ti servono! 🐾</div>
                    <div class="text-xs opacity-60 font-medium mt-2" id="initialTime"></div>
                </div>
            </div>
        </div>

        <!-- Quick Replies -->
        <div class="p-4 bg-white border-t border-green-200">
            <div class="grid grid-cols-2 gap-3">
                <!-- Bottone urgente centrato -->
                <div class="col-span-2 flex justify-center">
                    <button onclick="handleQuickReply('urgente')" class="bg-orange-500 text-white border-orange-500 text-sm py-2 px-4 rounded-xl font-semibold w-1/2">
                        URGENTE
                    </button>
                </div>
                
                <!-- Altri bottoni -->
                <button onclick="handleQuickReply('orari')" class="bg-green-50 hover:bg-green-100 text-black hover:text-green-800 border-green-200 hover:border-green-300 text-sm py-3 px-4 rounded-xl border transition-all hover:scale-105 active:scale-95 font-semibold shadow-sm hover:shadow-md">
                    🕐 Orari
                </button>
                <button onclick="handleQuickReply('prezzi')" class="bg-green-50 hover:bg-green-100 text-black hover:text-green-800 border-green-200 hover:border-green-300 text-sm py-3 px-4 rounded-xl border transition-all hover:scale-105 active:scale-95 font-semibold shadow-sm hover:shadow-md">
                    💰 Prezzi
                </button>
                <button onclick="handleQuickReply('dove')" class="bg-green-50 hover:bg-green-100 text-black hover:text-green-800 border-green-200 hover:border-green-300 text-sm py-3 px-4 rounded-xl border transition-all hover:scale-105 active:scale-95 font-semibold shadow-sm hover:shadow-md">
                    📍 Dove siamo
                </button>
                <button onclick="handleQuickReply('prenotazione')" class="bg-green-50 hover:bg-green-100 text-black hover:text-green-800 border-green-200 hover:border-green-300 text-sm py-3 px-4 rounded-xl border transition-all hover:scale-105 active:scale-95 font-semibold shadow-sm hover:shadow-md">
                    📞 Prenotazioni
                </button>
                <button onclick="handleQuickReply('servizi')" class="bg-green-50 hover:bg-green-100 text-black hover:text-green-800 border-green-200 hover:border-green-300 text-sm py-3 px-4 rounded-xl border transition-all hover:scale-105 active:scale-95 font-semibold shadow-sm hover:shadow-md">
                    🩺 Servizi
                </button>
                <button onclick="handleQuickReply('preparazione')" class="bg-green-50 hover:bg-green-100 text-black hover:text-green-800 border-green-200 hover:border-green-300 text-sm py-3 px-4 rounded-xl border transition-all hover:scale-105 active:scale-95 font-semibold shadow-sm hover:shadow-md">
                    📋 Come preparare
                </button>
            </div>
            <p class="text-xs text-gray-600 mt-4 text-center flex items-center justify-center font-medium">
                <svg class="w-3 h-3 text-green-400 mr-1" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"></path>
                </svg>
                Per emergenze usa sempre il bottone URGENTE!
            </p>
        </div>
    </div>

    <script>
        // Imposta il timestamp iniziale
        document.getElementById('initialTime').textContent = new Date().toLocaleTimeString('it-IT', { 
            hour: '2-digit', 
            minute: '2-digit' 
        });

        // Risposte del bot
        const botResponses = {
            urgente: "🚨 **EMERGENZE 24/7:**\n\n📞 **CHIAMA SUBITO:** 030-123456\n📱 **WhatsApp Urgenze:** 347-987654\n\n⚠️ **SINTOMI GRAVI:**\n• Difficoltà respiratorie\n• Convulsioni\n• Trauma/incidenti\n• Avvelenamento\n• Emorragie\n\n🏥 **PRONTO SOCCORSO:**\nVia Roma 15, Brescia\nAperto 24h/7giorni\n\n💡 Per emergenze vere CHIAMA, non scrivere!",
            orari: "🕐 **ORARI VISITE:**\n\n📅 **Lunedì - Venerdì:** 8:30 - 19:00\n📅 **Sabato:** 8:30 - 13:00\n📅 **Domenica:** CHIUSI\n\n⏰ **Orari specifici:**\n• Visite: 9:00 - 18:00\n• Chirurgie: 14:00 - 17:00\n• Emergenze: 24/7\n\n💡 Solo su appuntamento (tranne emergenze)",
            prezzi: "💰 **LISTINO PREZZI:**\n\n🐕 **CANI:**\n• Prima visita: 45€\n• Visita controllo: 35€\n• Vaccini: 25-35€\n• Sterilizzazione: 180-250€\n\n🐱 **GATTI:**\n• Prima visita: 40€\n• Visita controllo: 30€\n• Vaccini: 25-30€\n• Sterilizzazione: 120-180€\n\n🔬 **ESAMI:**\n• Analisi sangue: 35-60€\n• Radiografie: 45-80€\n• Ecografie: 60-90€\n\n*Prezzi indicativi",
            dove: "📍 **STUDIO VETERINARIO BIANCHI:**\n\n🏥 Via Giuseppe Verdi 42, 25100 Brescia\n🅿️ Parcheggio gratuito interno\n🚌 Fermata bus linea 12 a 50m\n🚗 Uscita A4 Brescia Est (5 min)\n\n🏪 Zona centro, vicino Poste Italiane\n🗺️ GPS: 45.5416, 10.2118\n\n📱 Su Google Maps cerca:\n\"Studio Veterinario Bianchi Brescia\"",
            prenotazione: "📞 **PRENOTAZIONI:**\n\n☎️ **Telefono:** 030-123456\n📱 **WhatsApp:** 347-987654\n⏰ **Orari segreteria:** Lun-Ven 8:30-19:00, Sab 8:30-13:00\n\n💻 **ONLINE:**\nwww.veterinariobianchi.it/prenota\n\n⚠️ **IMPORTANTE:**\n• Prenotazione obbligatoria\n• Confermare 24h prima\n• Portare libretto sanitario\n• Per urgenze chiamare sempre\n\n🐾 Prime visite: prenotare con almeno 3 giorni",
            servizi: "🩺 **I NOSTRI SERVIZI:**\n\n🔍 **VISITE & DIAGNOSI:**\n• Visite cliniche complete\n• Check-up geriatrici\n• Consulenze comportamentali\n• Medicina preventiva\n\n💉 **PREVENZIONE:**\n• Vaccinazioni cani/gatti\n• Trattamenti antiparassitari\n• Profilassi dentale\n• Microchip\n\n🏥 **CHIRURGIA:**\n• Sterilizzazioni\n• Chirurgia generale\n• Odontoiatria\n• Ortopedia base\n\n🔬 **DIAGNOSTICA:**\n• Radiologie digitali\n• Ecografie\n• Analisi laboratorio\n• Esami cardiologici",
            preparazione: "📋 **COME PREPARARE L'ANIMALE:**\n\n✅ **COSA PORTARE:**\n• Libretto sanitario/passaporto\n• Documento d'identità proprietario\n• Lista farmaci attuali\n• Campioni feci/urine (se richiesti)\n\n⏰ **PRIMA DELLA VISITA:**\n• Per analisi sangue: digiuno 12h\n• Per ecografie: digiuno 8h\n• Per visite normali: pasto leggero ok\n\n🐕 **PREPARAZIONE ANIMALE:**\n• Guinzaglio per cani\n• Trasportino per gatti\n• Mantenere calmo l'animale\n• Non dare tranquillanti fai-da-te\n\n📝 **PRIMA VISITA:**\nPortare tutta la documentazione sanitaria precedente"
        };

        const quickReplies = {
            urgente: "URGENTE",
            orari: "🕐 Orari",
            prezzi: "💰 Prezzi", 
            dove: "📍 Dove siamo",
            prenotazione: "📞 Prenotazioni",
            servizi: "🩺 Servizi",
            preparazione: "📋 Come preparare"
        };

        function handleQuickReply(key) {
            const chatMessages = document.getElementById('chatMessages');
            const response = botResponses[key];
            const buttonText = quickReplies[key];
            
            if (response) {
                // Aggiungi messaggio utente
                const userMessage = document.createElement('div');
                userMessage.className = 'flex justify-end';
                userMessage.innerHTML = `
                    <div class="max-w-xs lg:max-w-md px-4 py-3 rounded-2xl bg-green-500 text-white rounded-br-md shadow-lg">
                        <div class="whitespace-pre-line text-sm leading-relaxed font-medium">${buttonText}</div>
                        <div class="text-xs opacity-70 mt-2">${new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}</div>
                    </div>
                `;
                chatMessages.appendChild(userMessage);

                // Mostra indicatore di digitazione
                const typingIndicator = document.createElement('div');
                typingIndicator.className = 'flex justify-start';
                typingIndicator.id = 'typing';
                typingIndicator.innerHTML = `
                    <div class="bg-white text-black shadow-md border border-green-200 px-4 py-3 rounded-2xl rounded-bl-md">
                        <div class="flex space-x-1">
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-bounce"></div>
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                            <div class="w-2 h-2 bg-green-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        </div>
                    </div>
                `;
                chatMessages.appendChild(typingIndicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // Rimuovi indicatore e aggiungi risposta dopo 1.5 secondi
                setTimeout(() => {
                    chatMessages.removeChild(typingIndicator);
                    
                    const botMessage = document.createElement('div');
                    botMessage.className = 'flex justify-start';
                    botMessage.innerHTML = `
                        <div class="max-w-xs lg:max-w-md px-4 py-3 rounded-2xl bg-white text-black shadow-md border border-green-200 rounded-bl-md">
                            <div class="whitespace-pre-line text-sm leading-relaxed font-semibold">${response}</div>
                            <div class="text-xs opacity-60 font-medium mt-2">${new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}</div>
                        </div>
                    `;
                    chatMessages.appendChild(botMessage);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }, 1500);
            }
        }
    </script>
</body>
</html>
